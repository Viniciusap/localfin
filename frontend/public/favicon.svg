<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Coin body -->
  <circle cx="16" cy="16" r="15" fill="#F59E0B"/>
  <!-- Coin rim -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#D97706" stroke-width="1.5"/>
  <!-- Inner circle -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#FBBF24" stroke-width="1"/>
  <!-- Dollar sign -->
  <text x="16" y="21.5" font-family="Georgia, serif" font-size="14" font-weight="bold"
        text-anchor="middle" fill="#92400E">$</text>
</svg>
